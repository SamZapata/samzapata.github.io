<div class="container section">
  <h2 class="section-title" data-i18n="contact.title">Contact</h2>

  <div class="contact-wrapper">
    <div class="contact-info">
      <h3 data-i18n="contact.heading">Let's talk</h3>
      <p data-i18n="contact.intro">Have a project in mind or just want to say hi? I'd love to hear from you.</p>

      <div class="contact-detail">
        <div class="contact-detail-icon"><i class="fas fa-envelope"></i></div>
        <a href="mailto:jsamzapata@gmail.com">jsamzapata@gmail.com</a>
      </div>
      <div class="contact-detail">
        <div class="contact-detail-icon"><i class="fab fa-github"></i></div>
        <a href="https://github.com/SamZapata" target="_blank">github.com/SamZapata</a>
      </div>
      <div class="contact-detail">
        <div class="contact-detail-icon"><i class="fab fa-linkedin-in"></i></div>
        <a href="https://www.linkedin.com/in/johnny-s-zapata-s" target="_blank">linkedin.com/in/johnny-s-zapata-s</a>
      </div>

      <div class="hero-social mt-4">
        <a href="https://github.com/SamZapata" target="_blank" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/johnny-s-zapata-s" target="_blank" aria-label="LinkedIn">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="mailto:jsamzapata@gmail.com" aria-label="Email">
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </div>

    <form class="contact-form" action="mailto:jsamuelzapata@gmail.com" method="post" enctype="text/plain">
      <div class="form-group">
        <label for="fname" data-i18n="contact.label_name">Full Name</label>
        <input type="text" class="form-control" id="fname" name="firstname" placeholder="Your full name" data-i18n="contact.placeholder_name">
      </div>
      <div class="form-group">
        <label for="email" data-i18n="contact.label_email">Email</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Your email" data-i18n="contact.placeholder_email">
      </div>
      <div class="form-group">
        <label for="phone" data-i18n="contact.label_phone">Contact Number</label>
        <input type="text" class="form-control" id="phone" name="phone" placeholder="Your phone number" data-i18n="contact.placeholder_phone">
      </div>
      <div class="form-group">
        <label for="subject" data-i18n="contact.label_message">Message</label>
        <textarea class="form-control" id="subject" name="subject" placeholder="Write something..." data-i18n="contact.placeholder_message"></textarea>
      </div>
      <button type="submit" class="btn-primary-custom">
        <i class="fas fa-paper-plane"></i> <span data-i18n="contact.btn_send">Send Message</span>
      </button>
    </form>
  </div>
</div>
